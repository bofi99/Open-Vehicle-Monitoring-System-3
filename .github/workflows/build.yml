name: Build OVMS3 Firmware

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build firmware using Docker
        run: |
          cd vehicle/OVMS.V3
          cp support/sdkconfig.default.hw31 sdkconfig
          docker run --rm -v ${{ github.workspace }}/vehicle/OVMS.V3:/project -w /project openvehicles/ovms3-build make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ovms3-firmware
          path: vehicle/OVMS.V3/build/ovms3.bin
